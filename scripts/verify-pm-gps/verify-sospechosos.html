      { id: 2082, lat: -17.74708000, lon: -63.16968210, dist: 309, fuente: "century21", url: "https://c21.com.bo/propiedad/101216_monoambiente-en-preventa-zona-norte-essenzia", cluster: "B" },
      { id: 2269, lat: -17.74707217, lon: -63.16945546, dist: 320, fuente: "remax", url: "https://remax.bo/propiedad/venta-departamento-santa-cruz-de-la-sierra-hamacas-125001306-100", cluster: "B" },
      { id: 2098, lat: -17.74865129, lon: -63.17094531, dist: 448, fuente: "century21", url: "https://c21.com.bo/propiedad/98237_condominio-essenzia", cluster: "C" },
      { id: 2097, lat: -17.74876369, lon: -63.17152466, dist: 464, fuente: "century21", url: "https://c21.com.bo/propiedad/97817_condominio-essenzia", cluster: "C" },
      { id: 2099, lat: -17.74912133, lon: -63.17197528, dist: 510, fuente: "century21", url: "https://c21.com.bo/propiedad/98247_condominio-essenzia", cluster: "C" }
    ]
  }
];

const STORAGE_KEY = "verify-sospechosos-v1";
let decisions = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

function saveDecisions() { localStorage.setItem(STORAGE_KEY, JSON.stringify(decisions)); }

function gmapsUrl(lat, lon) { return `https://www.google.com/maps/@${lat},${lon},19z`; }
function gmapsSatUrl(lat, lon) { return `https://www.google.com/maps/@${lat},${lon},19z/data=!3m1!1e3`; }
function streetUrl(lat, lon) { return `https://www.google.com/maps?q=&layer=c&cbll=${lat},${lon}`; }
function searchUrl(nombre) { return `https://www.google.com/maps/search/${encodeURIComponent(nombre + ", Santa Cruz, Bolivia")}`; }
function osmUrl(lat, lon) { return `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}&zoom=19`; }

function renderCard(pm) {
  const d = decisions[pm.pm_id] || {};
  const verdict = d.verdict || "pending";

  // Agrupar props por cluster
  const clusters = {};
  pm.props.forEach(p => {
    if (!clusters[p.cluster]) clusters[p.cluster] = [];
    clusters[p.cluster].push(p);
  });

  const propsHtml = Object.keys(clusters).sort().map(letter => {
    const ps = clusters[letter];
    const clusterHeader = pm.props.length > 1 || Object.keys(clusters).length > 1
      ? `<h4><span class="cluster-label cluster-${letter.toLowerCase()}">Sub-cluster ${letter}</span> ${ps.length} props (~${Math.round(ps.reduce((a,p)=>a+p.dist,0)/ps.length)}m del pm)</h4>`
      : '';
    const rows = ps.map(p => `
      <div class="prop-row">
        <a href="${p.url}" target="_blank" class="url">${p.url}</a>
        <div class="prop-meta">
          ID ${p.id} · ${p.fuente} · GPS ${p.lat.toFixed(6)}, ${p.lon.toFixed(6)} · <b>${p.dist}m del pm</b>
        </div>
        <div class="prop-btns">
          <a href="${gmapsSatUrl(p.lat, p.lon)}" target="_blank" class="btn btn-primary">🛰️ Sat</a>
          <a href="${streetUrl(p.lat, p.lon)}" target="_blank" class="btn">📷 SV</a>
          <a href="${osmUrl(p.lat, p.lon)}" target="_blank" class="btn">🌐 OSM</a>
        </div>
      </div>
    `).join('');
    return clusterHeader + rows;
  }).join('');

  const recClass = pm.recomendacion === 'ok' ? 'ok' : pm.recomendacion === 'bad' ? 'bad' : '';
  const cardClass = verdict;
  const expanded = d._expanded ? ' expanded' : '';

  return `
    <div class="pm-card ${cardClass}${expanded}" data-pmid="${pm.pm_id}">
      <div class="pm-header" onclick="toggleCard(${pm.pm_id})">
        <div>
          <div class="pm-title">${pm.nombre} <small style="color:#999">(ID ${pm.pm_id})</small></div>
          <div class="pm-summary">
            ${pm.n_props} props · dispersión cluster: ${pm.disp_cluster_m}m · pm vs cluster: ${pm.dist_pm_cluster_m}m
            ${pm.nota_anterior ? ' · 📝 ' + pm.nota_anterior : ''}
          </div>
        </div>
        <span class="pm-veredicto-badge">${verdict.toUpperCase()}</span>
      </div>

      <div class="pm-body">
        <div class="pm-recomendacion ${recClass}">
          <b>Diagnóstico automático:</b> ${pm.diagnostico}<br/>
          <b>Recomendación:</b> ${pm.recomendacion_texto}
        </div>

        <div class="info-grid">
          <div><b>GPS del pm:</b><br/>${pm.pm_lat.toFixed(6)}, ${pm.pm_lon.toFixed(6)}</div>
          <div><b>Cantidad props:</b><br/>${pm.n_props}</div>
        </div>

        <div class="btn-row">
          <a href="${gmapsSatUrl(pm.pm_lat, pm.pm_lon)}" target="_blank" class="btn btn-primary">🛰️ Maps satelital (GPS del pm)</a>
          <a href="${streetUrl(pm.pm_lat, pm.pm_lon)}" target="_blank" class="btn">📷 Street View</a>
          <a href="${searchUrl(pm.nombre)}" target="_blank" class="btn">🔍 Buscar "${pm.nombre}" en Maps</a>
          <a href="${osmUrl(pm.pm_lat, pm.pm_lon)}" target="_blank" class="btn">🌐 OSM</a>
        </div>

        <!-- Mini-mapa con todos los pins (pm + props) sobre vista satelital -->
        <div class="mini-map" id="map-${pm.pm_id}"></div>

        <div class="props-section">
          <h4 style="margin-top:0">📍 Props matched al pm (con sus propios GPS y URLs)</h4>
          ${propsHtml}
        </div>

        <div class="verdict-row">
          <button class="verdict-btn confirmed ${verdict==='confirmed'?'active':''}" onclick="setVerdict(${pm.pm_id}, 'confirmed', event)">✅ Confirmed</button>
          <button class="verdict-btn sospechoso ${verdict==='sospechoso'?'active':''}" onclick="setVerdict(${pm.pm_id}, 'sospechoso', event)">⚠️ Sigue sospechoso</button>
          <button class="verdict-btn dividir ${verdict==='dividir'?'active':''}" onclick="setVerdict(${pm.pm_id}, 'dividir', event)">✂️ Dividir pm</button>
          <button class="verdict-btn mover ${verdict==='mover'?'active':''}" onclick="setVerdict(${pm.pm_id}, 'mover', event)">📍 Mover GPS</button>
        </div>
        <textarea placeholder="Notas (ej: nuevo GPS, nombre real, edificios a separar...)" onblur="setNotes(${pm.pm_id}, this.value)">${d.notes || ''}</textarea>
      </div>
    </div>
  `;
}

function renderAll() {
  // Limpiar tracking de mapas (los contenedores se recrean)
  initializedMaps.clear();
  document.getElementById("cards").innerHTML = DATA.map(renderCard).join('');
  updateStats();
  // Re-inicializar mapas de cards expandidas
  DATA.forEach(pm => {
    if (decisions[pm.pm_id]?._expanded) {
      setTimeout(() => initMiniMap(pm), 50);
    }
  });
}

function updateStats() {
  const total = DATA.length;
  const counts = { confirmed: 0, sospechoso: 0, dividir: 0, mover: 0, pending: 0 };
  DATA.forEach(pm => {
    const v = decisions[pm.pm_id]?.verdict || 'pending';
    counts[v]++;
  });
  document.getElementById("stats").innerHTML =
    `Total: ${total} · ✅ ${counts.confirmed} · ⚠️ ${counts.sospechoso} · ✂️ ${counts.dividir} · 📍 ${counts.mover} · ⏳ Sin revisar: ${counts.pending}`;
}

const initializedMaps = new Set();

function initMiniMap(pm) {
  if (initializedMaps.has(pm.pm_id)) return;
  const containerId = `map-${pm.pm_id}`;
  const container = document.getElementById(containerId);
  if (!container) return;

  const map = L.map(containerId, { scrollWheelZoom: false });

  // Capa satelital Esri (sin API key, gratis)
  const sat = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: 'Esri/ArcGIS', maxZoom: 19 }
  );
  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  });
  sat.addTo(map);
  L.control.layers({ 'Satélite': sat, 'OpenStreetMap': osm }).addTo(map);

  // Pin del pm (grande, magenta)
  const pmMarker = L.circleMarker([pm.pm_lat, pm.pm_lon], {
    radius: 12, color: '#d63384', fillColor: '#d63384', fillOpacity: 0.6, weight: 3
  }).addTo(map).bindPopup(
    `<b>📌 pm: ${pm.nombre}</b><br/>` +
    `ID: ${pm.pm_id}<br/>GPS: ${pm.pm_lat.toFixed(6)}, ${pm.pm_lon.toFixed(6)}<br/>` +
    `<a href="${gmapsSatUrl(pm.pm_lat, pm.pm_lon)}" target="_blank">🛰️ Maps</a> · ` +
    `<a href="${streetUrl(pm.pm_lat, pm.pm_lon)}" target="_blank">📷 SV</a>`
  );

  // Pins de las props (color por cluster)
  const clusterColors = { A: '#28a745', B: '#ffc107', C: '#dc3545' };
  const bounds = [[pm.pm_lat, pm.pm_lon]];
  pm.props.forEach(p => {
    const color = clusterColors[p.cluster] || '#6c757d';
    L.circleMarker([p.lat, p.lon], {
      radius: 7, color: color, fillColor: color, fillOpacity: 0.7, weight: 2
    }).addTo(map).bindPopup(
      `<b>Prop ${p.id}</b> (cluster ${p.cluster})<br/>` +
      `${p.fuente} · ${p.dist}m del pm<br/>` +
      `<a href="${p.url}" target="_blank">Ver anuncio</a><br/>` +
      `<a href="${gmapsSatUrl(p.lat, p.lon)}" target="_blank">🛰️ Maps</a> · ` +
      `<a href="${streetUrl(p.lat, p.lon)}" target="_blank">📷 SV</a>`
    );
    bounds.push([p.lat, p.lon]);
  });

  // Encuadrar todo automáticamente
  map.fitBounds(bounds, { padding: [30, 30], maxZoom: 19 });

  // Legend
  const legend = L.control({ position: 'topright' });
  legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'map-legend');
    let html = '<div><span class="dot" style="background:#d63384"></span><b>pm</b></div>';
    const clusters = [...new Set(pm.props.map(p => p.cluster))].sort();
    clusters.forEach(c => {
      html += `<div><span class="dot" style="background:${clusterColors[c]}"></span>Cluster ${c}</div>`;
    });
    div.innerHTML = html;
    return div;
  };
  legend.addTo(map);

  initializedMaps.add(pm.pm_id);
}

function toggleCard(pmId) {
  if (!decisions[pmId]) decisions[pmId] = {};
  decisions[pmId]._expanded = !decisions[pmId]._expanded;
  saveDecisions();
  const card = document.querySelector(`[data-pmid="${pmId}"]`);
  card.classList.toggle('expanded');

  // Lazy init del mini-mapa al expandir por primera vez
  if (card.classList.contains('expanded')) {
    const pm = DATA.find(p => p.pm_id === pmId);
    setTimeout(() => initMiniMap(pm), 50); // tiny delay para que el DOM tenga la altura
  }
}

function setVerdict(pmId, verdict, ev) {
  ev?.stopPropagation();
  if (!decisions[pmId]) decisions[pmId] = { _expanded: true };
  if (decisions[pmId].verdict === verdict) {
    delete decisions[pmId].verdict; // toggle off
  } else {
    decisions[pmId].verdict = verdict;
  }
  saveDecisions();
  renderAll();
}

function setNotes(pmId, notes) {
  if (!decisions[pmId]) decisions[pmId] = {};
  decisions[pmId].notes = notes;
  saveDecisions();
}

document.getElementById("export-btn").addEventListener("click", () => {
  const lines = [
    "-- Re-verificación de sospechosos Zona Norte",
    "-- Generado desde verify-sospechosos.html · " + new Date().toISOString(),
    "",
    "BEGIN;",
    ""
  ];
  let n = 0;
  for (const pm of DATA) {
    const d = decisions[pm.pm_id];
    if (!d?.verdict) continue;
    const notes = (d.notes || '').replace(/'/g, "''");
    lines.push(`-- pm ${pm.pm_id} ${pm.nombre} → ${d.verdict}`);
    lines.push(
      `UPDATE proyectos_master SET ` +
      `gps_verificado_visual = '${d.verdict}', ` +
      `gps_verificacion_notas = '${notes || 're-verificacion ' + d.verdict}', ` +
      `gps_verificado_visual_at = NOW() ` +
      `WHERE id_proyecto_master = ${pm.pm_id};`
    );
    lines.push("");
    n++;
  }
  lines.push(`-- Total decisiones: ${n}`);
  lines.push("");
  lines.push("-- Resumen post-UPDATE:");
  lines.push("SELECT gps_verificado_visual, COUNT(*) FROM proyectos_master WHERE zona='Zona Norte' GROUP BY 1;");
  lines.push("");
  lines.push("COMMIT;");

  const blob = new Blob([lines.join("\n")], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "update-sospechosos.sql";
  a.click();
  URL.revokeObjectURL(url);
});

renderAll();
</script>
</body>
</html>
