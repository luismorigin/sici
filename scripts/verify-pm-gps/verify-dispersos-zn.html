const STORAGE_KEY = "verify-dispersos-zn-v1";
let decisions = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
function saveDecisions() { localStorage.setItem(STORAGE_KEY, JSON.stringify(decisions)); }

function gmapsSatUrl(lat, lon) { return `https://www.google.com/maps/place/${lat},${lon}/@${lat},${lon},19z/data=!3m1!1e3`; }
function streetUrl(lat, lon) { return `https://www.google.com/maps?q=&layer=c&cbll=${lat},${lon}`; }
function searchUrl(nombre) { return `https://www.google.com/maps/search/${encodeURIComponent(nombre + ", Santa Cruz, Bolivia")}`; }
function osmUrl(lat, lon) { return `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}&zoom=19`; }

const initializedMaps = new Set();

function initMiniMap(cluster) {
  if (initializedMaps.has(cluster.cluster_id)) return;
  const containerId = `map-${cluster.cluster_id}`;
  const container = document.getElementById(containerId);
  if (!container) return;
  const map = L.map(containerId, { scrollWheelZoom: false });
  const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri/ArcGIS', maxZoom: 19 });
  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 });
  sat.addTo(map);
  L.control.layers({ 'Satélite': sat, 'OpenStreetMap': osm }).addTo(map);

  // Pin del centroide propuesto
  L.circleMarker([cluster.centroide_lat, cluster.centroide_lon], { radius: 12, color: '#d63384', fillColor: '#d63384', fillOpacity: 0.4, weight: 3 })
    .addTo(map)
    .bindPopup(`<b>📌 Centroide propuesto</b><br/>GPS: ${cluster.centroide_lat.toFixed(6)}, ${cluster.centroide_lon.toFixed(6)}<br/><a href="${gmapsSatUrl(cluster.centroide_lat, cluster.centroide_lon)}" target="_blank">🛰️ Maps</a> · <a href="${streetUrl(cluster.centroide_lat, cluster.centroide_lon)}" target="_blank">📷 SV</a>`);

  const bounds = [[cluster.centroide_lat, cluster.centroide_lon]];
  cluster.props.forEach(p => {
    L.circleMarker([p.lat, p.lon], { radius: 7, color: '#28a745', fillColor: '#28a745', fillOpacity: 0.7, weight: 2 })
      .addTo(map)
      .bindPopup(`<b>Prop ${p.id}</b><br/>${p.fuente}<br/><a href="${p.url}" target="_blank">Ver anuncio</a><br/><a href="${gmapsSatUrl(p.lat, p.lon)}" target="_blank">🛰️ Maps</a> · <a href="${streetUrl(p.lat, p.lon)}" target="_blank">📷 SV</a>`);
    bounds.push([p.lat, p.lon]);
  });
  map.fitBounds(bounds, { padding: [30, 30], maxZoom: 19 });

  const legend = L.control({ position: 'topright' });
  legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'map-legend');
    div.innerHTML = '<div><span class="dot" style="background:#d63384"></span><b>Centroide</b></div><div><span class="dot" style="background:#28a745"></span>Prop</div>';
    return div;
  };
  legend.addTo(map);
  initializedMaps.add(cluster.cluster_id);
}

function renderCard(cluster) {
  const d = decisions[cluster.cluster_id] || {};
  const verdict = d.verdict || "pending";
  const propsHtml = cluster.props.map(p => `
    <div class="prop-row">
      <a href="${p.url}" target="_blank" class="url">${p.url}</a>
      <div class="prop-meta">ID ${p.id} · ${p.fuente} · GPS ${p.lat.toFixed(6)}, ${p.lon.toFixed(6)}</div>
      <div class="prop-btns">
        <a href="${gmapsSatUrl(p.lat, p.lon)}" target="_blank" class="btn btn-primary">🛰️ Sat</a>
        <a href="${streetUrl(p.lat, p.lon)}" target="_blank" class="btn">📷 SV</a>
        <a href="${osmUrl(p.lat, p.lon)}" target="_blank" class="btn">🌐 OSM</a>
      </div>
    </div>`).join('');

  const recClass = cluster.recomendacion === 'ok' ? 'ok' : cluster.recomendacion === 'bad' ? 'bad' : '';
  const expanded = d._expanded ? ' expanded' : '';
  return `
    <div class="pm-card ${verdict}${expanded}" data-cid="${cluster.cluster_id}">
      <div class="pm-header" onclick="toggleCard('${cluster.cluster_id}')">
        <div>
          <div class="pm-title">${cluster.nombre_propuesto}</div>
          <div class="pm-summary">${cluster.n_props} props · disp ${cluster.disp_m}m · "${cluster.nombre_original}"</div>
        </div>
        <span class="pm-veredicto-badge">${verdict.toUpperCase()}</span>
      </div>
      <div class="pm-body">
        <div class="pm-recomendacion ${recClass}"><b>Diagnóstico:</b> ${cluster.diagnostico}<br/><b>Recomendación:</b> ${cluster.recomendacion_texto}</div>
        <div class="info-grid"><div><b>Centroide:</b><br/>${cluster.centroide_lat.toFixed(6)}, ${cluster.centroide_lon.toFixed(6)}</div><div><b>Cantidad props:</b><br/>${cluster.n_props}</div></div>
        <div class="btn-row">
          <a href="${gmapsSatUrl(cluster.centroide_lat, cluster.centroide_lon)}" target="_blank" class="btn btn-primary">🛰️ Maps satelital (centroide)</a>
          <a href="${streetUrl(cluster.centroide_lat, cluster.centroide_lon)}" target="_blank" class="btn">📷 Street View</a>
          <a href="${searchUrl(cluster.nombre_original)}" target="_blank" class="btn">🔍 Buscar "${cluster.nombre_original}" en Maps</a>
        </div>
        <div class="mini-map" id="map-${cluster.cluster_id}"></div>
        <div><h4 style="margin-top:14px;font-size:13px;color:#555">📍 Props del cluster</h4>${propsHtml}</div>
        <div class="verdict-row">
          <button class="verdict-btn crear_pm ${verdict==='crear_pm'?'active':''}" onclick="setVerdict('${cluster.cluster_id}', 'crear_pm', event)">✅ Cargar pm</button>
          <button class="verdict-btn gps_errado ${verdict==='gps_errado'?'active':''}" onclick="setVerdict('${cluster.cluster_id}', 'gps_errado', event)">📍 GPS errado del agente</button>
          <button class="verdict-btn revisar ${verdict==='revisar'?'active':''}" onclick="setVerdict('${cluster.cluster_id}', 'revisar', event)">⚠️ Revisar después</button>
          <button class="verdict-btn descartar ${verdict==='descartar'?'active':''}" onclick="setVerdict('${cluster.cluster_id}', 'descartar', event)">❌ Descartar</button>
        </div>
        <textarea placeholder="Notas (nombre canónico real, GPS corregido si es otro, comentarios)" onblur="setNotes('${cluster.cluster_id}', this.value)">${d.notes || ''}</textarea>
      </div>
    </div>`;
}

function renderAll() {
  initializedMaps.clear();
  document.getElementById("cards").innerHTML = DATA.map(renderCard).join('');
  updateStats();
  DATA.forEach(c => { if (decisions[c.cluster_id]?._expanded) setTimeout(() => initMiniMap(c), 50); });
}

function updateStats() {
  const total = DATA.length;
  const c = { crear_pm: 0, descartar: 0, gps_errado: 0, revisar: 0, pending: 0 };
  DATA.forEach(x => { c[decisions[x.cluster_id]?.verdict || 'pending']++; });
  document.getElementById("stats").innerHTML = `Total: ${total} sub-clusters · ✅ ${c.crear_pm} · 📍 ${c.gps_errado} · ⚠️ ${c.revisar} · ❌ ${c.descartar} · ⏳ Sin revisar: ${c.pending}`;
}

function toggleCard(cid) {
  if (!decisions[cid]) decisions[cid] = {};
  decisions[cid]._expanded = !decisions[cid]._expanded;
  saveDecisions();
  const card = document.querySelector(`[data-cid="${cid}"]`);
  card.classList.toggle('expanded');
  if (card.classList.contains('expanded')) {
    const c = DATA.find(x => x.cluster_id === cid);
    setTimeout(() => initMiniMap(c), 50);
  }
}

function setVerdict(cid, verdict, ev) {
  ev?.stopPropagation();
  if (!decisions[cid]) decisions[cid] = { _expanded: true };
  if (decisions[cid].verdict === verdict) delete decisions[cid].verdict;
  else decisions[cid].verdict = verdict;
  saveDecisions();
  renderAll();
}

function setNotes(cid, notes) {
  if (!decisions[cid]) decisions[cid] = {};
  decisions[cid].notes = notes;
  saveDecisions();
}

document.getElementById("export-btn").addEventListener("click", () => {
  const lines = [
    "-- Decisiones nombres dispersos Zona Norte (sesion 2)",
    "-- Generado desde verify-dispersos-zn.html · " + new Date().toISOString(),
    "",
    "-- Resumen por cluster_id:",
    ""
  ];
  let n = 0;
  for (const cluster of DATA) {
    const d = decisions[cluster.cluster_id];
    if (!d?.verdict) continue;
    const notes = (d.notes || '').replace(/'/g, "''");
    lines.push(`-- ${cluster.cluster_id} (${cluster.nombre_propuesto}) → ${d.verdict}`);
    lines.push(`-- Centroide: ${cluster.centroide_lat}, ${cluster.centroide_lon} · ${cluster.n_props} props`);
    lines.push(`-- Props IDs: ${cluster.props.map(p => p.id).join(',')}`);
    if (notes) lines.push(`-- Notas: ${notes}`);
    lines.push("");
    n++;
  }
  lines.push(`-- Total decisiones: ${n}`);
  lines.push("");
  lines.push("-- NOTA: Este archivo es REPORTE de decisiones. El SQL final se genera al revisar tus notas.");
  lines.push("-- Pasame este archivo y armo los INSERT/UPDATE finales segun las decisiones que hayas tomado.");

  const blob = new Blob([lines.join("\n")], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "update-dispersos-zn.sql";
  a.click();
  URL.revokeObjectURL(url);
});

renderAll();
</script>
</body>
</html>
