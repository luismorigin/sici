<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broker Share — Alquileres</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f8f6f3;
    --muted: #888;
    --gold: #c9a959;
    --gold-dim: #9a7e3a;
    --green: #4caf50;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 24px 16px;
  }

  header {
    max-width: 720px;
    margin: 0 auto 32px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
  }

  .counter-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 20px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .counter-text {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .counter-sent {
    font-size: 13px;
    color: var(--green);
    font-weight: 500;
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: color 0.15s, border-color 0.15s;
  }
  .reset-btn:hover { color: var(--text); border-color: var(--muted); }

  .main {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .broker-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .broker-header {
    padding: 14px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .broker-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--gold-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--bg);
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .broker-name {
    font-weight: 600;
    font-size: 14px;
    color: var(--gold);
  }

  .broker-phone {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }

  .broker-count {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .prop-list {
    display: flex;
    flex-direction: column;
  }

  .prop-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .prop-row:last-child { border-bottom: none; }
  .prop-row:hover { background: rgba(255,255,255,0.02); }

  .prop-check {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    accent-color: var(--green);
    cursor: pointer;
  }

  .prop-info {
    flex: 1;
    min-width: 0;
  }

  .prop-name {
    font-weight: 500;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .prop-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .prop-price {
    font-size: 12px;
    color: var(--gold);
    font-weight: 500;
    margin-top: 1px;
  }

  .prop-id {
    font-size: 11px;
    color: #555;
    flex-shrink: 0;
  }

  .wa-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #25d366;
    color: #fff;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    transition: background 0.15s, opacity 0.15s;
    white-space: nowrap;
  }
  .wa-btn:hover { background: #1ebd5a; }

  .wa-icon {
    width: 14px;
    height: 14px;
    fill: #fff;
  }

  .prop-row.sent .prop-name { color: var(--muted); text-decoration: line-through; }
  .prop-row.sent .prop-meta { opacity: 0.5; }
  .prop-row.sent .prop-price { opacity: 0.4; }
  .prop-row.sent .wa-btn { background: #1a6b3a; opacity: 0.7; }

  .prop-row.inactive { opacity: 0.4; background: rgba(255,60,60,0.04); }
  .prop-row.inactive .prop-name { color: #c44; text-decoration: line-through; }
  .prop-row.inactive .prop-meta { opacity: 0.5; }
  .prop-row.inactive .prop-price { opacity: 0.4; }
  .prop-row.inactive .wa-btn { display: none; }

  .inactive-tag {
    display: inline-block;
    background: #c44;
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.5px;
    text-decoration: none;
  }

  .inactive-label {
    display: flex;
    align-items: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .inactive-check {
    display: none;
  }

  .inactive-icon {
    font-size: 16px;
    opacity: 0.3;
    transition: opacity 0.15s;
  }
  .inactive-label:hover .inactive-icon { opacity: 0.7; }
  .inactive-check:checked + .inactive-icon { opacity: 1; }

  @media (max-width: 480px) {
    body { padding: 16px 10px; }
    .prop-row { padding: 10px 12px; gap: 8px; }
    .broker-header { padding: 12px 14px; }
    .wa-btn { padding: 6px 10px; font-size: 12px; }
  }
</style>
</head>

</header>

const STORAGE_KEY = 'broker_share_sent_v1';
const INACTIVE_KEY = 'broker_share_inactive_v1';

function formatPrecio(val) {
  const n = Math.round(parseFloat(val));
  return n.toLocaleString('de-DE'); // uses dots as thousands separator
}

function formatDorms(d) {
  if (d === null || d === undefined) return null;
  if (d === 0) return 'Estudio';
  return d + ' dorm';
}

function formatArea(a) {
  if (a === null || a === undefined) return null;
  const n = Math.round(parseFloat(a));
  return n + 'm\u00B2';
}

function displayZona(zona) {
  if (!zona) return 'Otras';
  switch (zona) {
    case 'Equipetrol': case 'Equipetrol Centro': return 'Eq. Centro';
    case 'Equipetrol Norte': case 'Equipetrol Norte/Norte': case 'Equipetrol Norte/Sur': return 'Eq. Norte';
    case 'Faremafu': return 'Eq. Oeste';
    case 'Equipetrol Franja': return 'Eq. 3er Anillo';
    case 'Villa Brigida': return 'V. Brigida';
    case 'Sin zona': case 'sin zona': return 'Otras';
    default: return zona;
  }
}

function buildMessage(prop) {
  const edificio = prop.nombre_edificio || 'Departamento';
  const zona = displayZona(prop.zona);
  const precio = formatPrecio(prop.precio_mensual_bob);

  const parts = [];
  const dorms = formatDorms(prop.dormitorios);
  if (dorms !== null) parts.push(dorms);
  const area = formatArea(prop.area_total_m2);
  if (area !== null) parts.push(area);
  parts.push('Bs ' + precio + '/mes');

  const line1 = edificio + ' \u2014 ' + zona;
  const line2 = parts.join(' \u00B7 ');
  const line3 = 'https://simonbo.com/alquileres?id=' + prop.id;

  return 'Mira este depto en alquiler:\n\n' + line1 + '\n' + line2 + '\n\n' + line3;
}

function encodeWA(msg) {
  // Manual encode to ensure correct formatting
  return encodeURIComponent(msg);
}

function buildWALink(phone, msg) {
  return 'https://wa.me/' + phone + '?text=' + encodeWA(msg);
}

function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0][0].toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

function getSentSet() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch(e) { return new Set(); }
}

function saveSentSet(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...s])); } catch(e) {}
}

function updateCounter() {
  const total = DATA.length;
  const sent = getSentSet().size;
  const inact = getInactiveSet().size;
  const pending = total - sent;
  document.getElementById('counter-text').textContent =
    pending === 0 ? 'Todos enviados' : pending + ' mensaje' + (pending !== 1 ? 's' : '') + ' por enviar';
  const parts = [];
  if (sent > 0) parts.push(sent + ' enviado' + (sent !== 1 ? 's' : ''));
  if (inact > 0) parts.push(inact + ' inactivo' + (inact !== 1 ? 's' : ''));
  document.getElementById('counter-sent').textContent = parts.join(' · ');
}

function toggleSent(id, checkbox) {
  const sent = getSentSet();
  const key = String(id);
  if (checkbox.checked) { sent.add(key); } else { sent.delete(key); }
  saveSentSet(sent);
  const row = document.querySelector('.prop-row[data-id="' + id + '"]');
  if (row) row.classList.toggle('sent', checkbox.checked);
  updateCounter();
}

function resetAll() {
  if (!confirm('Reiniciar todos los checks?')) return;
  saveSentSet(new Set());
  saveInactiveSet(new Set());
  document.querySelectorAll('.prop-check').forEach(cb => { cb.checked = false; });
  document.querySelectorAll('.inactive-check').forEach(cb => { cb.checked = false; });
  document.querySelectorAll('.prop-row').forEach(row => { row.classList.remove('sent'); row.classList.remove('inactive'); });
  updateCounter();
}

function getInactiveSet() {
  try {
    const raw = localStorage.getItem(INACTIVE_KEY);
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch(e) { return new Set(); }
}

function saveInactiveSet(s) {
  try { localStorage.setItem(INACTIVE_KEY, JSON.stringify([...s])); } catch(e) {}
}

function toggleInactive(id, checkbox) {
  const inactive = getInactiveSet();
  const key = String(id);
  if (checkbox.checked) { inactive.add(key); } else { inactive.delete(key); }
  saveInactiveSet(inactive);
  const row = document.querySelector('.prop-row[data-id="' + id + '"]');
  if (row) row.classList.toggle('inactive', checkbox.checked);
  updateCounter();
}

// Pre-seed sent + inactive IDs (merge with existing, never remove)
function seedIds() {
  const sent = getSentSet();
  SENT_IDS.forEach(id => sent.add(String(id)));
  saveSentSet(sent);

  const inactive = getInactiveSet();
  INACTIVE_IDS.forEach(id => inactive.add(String(id)));
  saveInactiveSet(inactive);
}
seedIds();

function render() {
  const sent = getSentSet();
  const inactive = getInactiveSet();

  // Group by whatsapp number
  const brokerMap = new Map();
  DATA.forEach(prop => {
    const phone = prop.whatsapp;
    const resolvedName = prop.nombre || NAME_MAP[phone.replace(/\D/g, '')] || null;
    if (!brokerMap.has(phone)) {
      brokerMap.set(phone, { nombre: resolvedName, phone, props: [] });
    }
    // Prefer named broker
    if (resolvedName && !brokerMap.get(phone).nombre) {
      brokerMap.get(phone).nombre = resolvedName;
    }
    brokerMap.get(phone).props.push(prop);
  });

  // Sort: named brokers first (alphabetically), then unnamed (by phone)
  const brokers = [...brokerMap.values()].sort((a, b) => {
    const aHasName = !!a.nombre;
    const bHasName = !!b.nombre;
    if (aHasName && !bHasName) return -1;
    if (!aHasName && bHasName) return 1;
    if (aHasName && bHasName) return a.nombre.localeCompare(b.nombre, 'es');
    return a.phone.localeCompare(b.phone);
  });

  const container = document.getElementById('main-container');
  container.innerHTML = '';

  brokers.forEach(broker => {
    const section = document.createElement('div');
    section.className = 'broker-section';

    const displayName = broker.nombre || broker.phone;
    const initStr = broker.nombre ? initials(broker.nombre) : '#';
    const propCount = broker.props.length;

    section.innerHTML = `
      <div class="broker-header">
        <div class="broker-avatar">${initStr}</div>
        <div>
          <div class="broker-name">${escHtml(displayName)}</div>
          ${broker.nombre ? '<div class="broker-phone">' + escHtml(broker.phone) + '</div>' : ''}
        </div>
        <div class="broker-count">${propCount} prop${propCount !== 1 ? 's' : ''}</div>
      </div>
      <div class="prop-list" id="list-${escHtml(broker.phone)}"></div>
    `;

    const list = section.querySelector('.prop-list');

    broker.props.forEach(prop => {
      const msg = buildMessage(prop);
      const waLink = buildWALink(prop.whatsapp, msg);
      const isSent = sent.has(String(prop.id));
      const isInactive = inactive.has(String(prop.id));

      const edificio = prop.nombre_edificio || 'Departamento';
      const dorms = formatDorms(prop.dormitorios);
      const area = formatArea(prop.area_total_m2);
      const precio = formatPrecio(prop.precio_mensual_bob);

      const metaParts = [];
      if (dorms !== null) metaParts.push(dorms);
      if (area !== null) metaParts.push(area);
      metaParts.push(prop.zona);

      const row = document.createElement('div');
      row.className = 'prop-row' + (isSent ? ' sent' : '') + (isInactive ? ' inactive' : '');
      row.setAttribute('data-id', prop.id);

      row.innerHTML = `
        <input type="checkbox" class="prop-check" ${isSent ? 'checked' : ''}
          onchange="toggleSent(${prop.id}, this)" title="Marcar como enviado">
        <div class="prop-info">
          <div class="prop-name">${escHtml(edificio)}${isInactive ? ' <span class="inactive-tag">INACTIVO</span>' : ''}</div>
          <div class="prop-meta">${escHtml(metaParts.join(' · '))}</div>
          <div class="prop-price">Bs ${escHtml(precio)}/mes</div>
        </div>
        <div class="prop-id">#${prop.id}</div>
        <label class="inactive-label" title="Marcar como inactivo (ya no disponible)">
          <input type="checkbox" class="inactive-check" ${isInactive ? 'checked' : ''}
            onchange="toggleInactive(${prop.id}, this)">
          <span class="inactive-icon">${isInactive ? '&#x26D4;' : '&#x1F6AB;'}</span>
        </label>
        <a class="wa-btn" href="${waLink}" target="_blank" rel="noopener">
          <svg class="wa-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          Enviar
        </a>
      `;

      list.appendChild(row);
    });

    container.appendChild(section);
  });

  updateCounter();
}

function escHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

render();
