<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b366"/>
      <stop offset="50%" style="stop-color:#c9a959"/>
      <stop offset="100%" style="stop-color:#b8943e"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="#0a0a0a"/>

  <!-- Inner subtle ring -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.3"/>

  <!-- "S" letter - elegant, Cormorant-inspired -->
  <text x="200" y="245"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="220"
        font-weight="400"
        font-style="italic"
        fill="url(#goldGrad)"
        text-anchor="middle"
        letter-spacing="-4">S</text>

  <!-- Subtle dot accent -->
  <circle cx="290" cy="290" r="8" fill="url(#goldGrad)" opacity="0.6"/>
</svg>